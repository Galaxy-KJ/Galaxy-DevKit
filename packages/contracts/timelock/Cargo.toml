[package]
name = "timelock"
version = "1.0.0"
edition = "2021"
description = "Soroban timelock contract with ETA enforcement and pre-ETA revocation"

[lib]
crate-type = ["cdylib"]

[dependencies]
soroban-sdk = "21.0.0"

[dev-dependencies]
soroban-sdk = { version = "21.0.0", features = ["testutils"] }

[profile.release]
overflow-checks = true
